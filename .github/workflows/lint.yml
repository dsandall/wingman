name: Lint

on:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  pyright:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Add venv to PATH
        run: echo "$(uv run python -c 'import sys; print(sys.prefix)')/bin" >> $GITHUB_PATH

      - uses: jakebailey/pyright-action@v2

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

  package:
    # Build the Arch package to catch PKGBUILD/packaging regressions. This only
    # builds the wheel and assembles the package — it never runs the app or
    # touches netbird/login.
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install minimal Arch build deps
        # Only the makedepends — all in the official 'extra' repo, no AUR. The
        # runtime deps (netbird is AUR, plus libcap/python-typer) aren't needed
        # to build the wheel, so the build runs with --nodeps below.
        run: |
          pacman -Syu --noconfirm --needed \
            git python-build python-installer python-wheel python-hatchling

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so pkgver() can count commits

      - name: makepkg build (no install)
        run: |
          git config --system --add safe.directory '*'
          useradd -m builder
          # Build from this checkout, not remote master, so the build reflects
          # the commit under test.
          sed -i "s|git+https://github.com/dsandall/wingman.git|git+file://$PWD|" \
            packaging/arch/PKGBUILD
          chown -R builder "$PWD"
          runuser -u builder -- bash -c \
            "cd '$PWD/packaging/arch' && makepkg --nodeps --clean --cleanbuild"

  check:
    if: always()
    needs:
      - pre-commit
      - pyright
      - test
      - package

    runs-on: ubuntu-latest

    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
