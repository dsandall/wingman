name: Publish to AUR

# Single source of truth: this repo. On every push to master the AUR
# `wingman-git` package (PKGBUILD + .SRCINFO) is regenerated and pushed to the
# AUR, so `paru -S wingman-git` always tracks master.
#
# One-time setup (see README / packaging notes):
#   1. Create an AUR account and add an SSH public key to it.
#   2. Add the matching private key as the repo secret AUR_SSH_PRIVATE_KEY.
#   3. Add the repo variable AUR_ENABLED=true to turn this on.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skips cleanly until AUR_ENABLED is set, so it never fails before setup.
    if: ${{ vars.AUR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the PKGBUILD pkgver() can count commits

      - name: Stamp the computed version into the PKGBUILD
        # The deploy action regenerates .SRCINFO with `makepkg --printsrcinfo`,
        # which does NOT run pkgver() (it never fetches the git source), so it
        # would otherwise publish the static `pkgver=0.1.4.r0.g0000000`
        # placeholder. Replicate pkgver() here and bake the real value in so the
        # AUR page and `paru` search show the true version. (pkgver() still runs
        # at build time on the user's machine, recomputing the same value.)
        run: |
          base=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')
          pkgver="${base}.r$(git rev-list --count HEAD).g$(git rev-parse --short=7 HEAD)"
          sed -i -E "s/^pkgver=.*/pkgver=${pkgver}/" packaging/arch/PKGBUILD
          echo "Stamped pkgver=${pkgver}"

      - name: Publish wingman-git to the AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: wingman-git
          pkgbuild: ./packaging/arch/PKGBUILD
          # The PKGBUILD's `install=` scriptlet must live next to PKGBUILD in the
          # AUR repo or `makepkg` fails. The action only pushes PKGBUILD/.SRCINFO
          # by default, so list it here; `cp -t` flattens it to its basename at
          # the AUR repo root, matching `install=wingman-git.install`. (The pacman
          # hook needs no entry — it's installed in package() from the git source.)
          assets: ./packaging/arch/wingman-git.install
          commit_username: dsandall
          commit_email: thebudman6@proton.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "wingman-git: sync from master @ ${{ github.sha }}"
          ssh_keyscan_types: rsa,ed25519
